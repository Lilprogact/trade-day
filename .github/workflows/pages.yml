# Redeploys the site whenever index.html changes on main: pushes the file to
# the gh-pages branch, which GitHub Pages serves (classic branch source —
# auto-enabled when gh-pages was first created).
name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pages-tmp
          git reset
          git add index.html
          touch .nojekyll
          printf '{"id":"%s"}' "$GITHUB_SHA" > version.json
          git add .nojekyll version.json
          git commit -m "Deploy ${GITHUB_SHA::7}"
          git push -f origin pages-tmp:gh-pages
